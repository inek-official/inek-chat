<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - Supabase Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #fff5fb; height: 100vh; display: flex; flex-direction: column; }
    header { height: 56px; display: flex; align-items: center; padding: 0 16px; background: #ff9ecb; color: #fff; }
    .layout { display: flex; height: calc(100vh - 56px); }
    .sidebar { width: 280px; background: #ffe3f1; border-right: 1px solid #f5c8dd; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .friend-list { flex: 1; overflow-y: auto; }
    .friend { padding: 10px; background: #fff; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
    .chat-area { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 8px; }
    .messages { flex: 1; background: #fff; border-radius: 16px; padding: 12px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .bubble { max-width: 75%; padding: 8px 12px; border-radius: 14px; margin-bottom: 8px; font-size: 0.9rem; clear: both; }
    .bubble.me { background: #ff9ecb; color: #fff; float: right; }
    .bubble.other { background: #f3f3f3; color: #444; float: left; }
    .bubble img { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; }
    .input-area { display: flex; gap: 8px; padding: 10px; background: #fff5fb; align-items: center; }
    .input-area input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #e3c7d7; }
    button { background: #ff7ab8; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <button onclick="location.href='index.html'" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">←</button>
    <h1 style="font-size:1.2rem; margin-left:10px;">INEK Chat</h1>
    <span id="myName" style="margin-left:auto; font-size:0.8rem;"></span>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2>ユーザー検索</h2>
      <input type="text" id="searchUser" placeholder="IDで検索..." style="width:100%; padding:8px; border-radius:5px; border:1px solid #ffb6d9;">
      <div id="searchResults" class="friend-list"></div>
      <h2 style="margin-top:20px;">フレンド一覧</h2>
      <div id="friendList" class="friend-list"></div>
    </aside>

    <section class="chat-area">
      <div id="targetName" style="color:#888;">チャット相手を選んでください</div>
      <div id="messages" class="messages"></div>
      <div class="input-area">
        <label style="cursor:pointer; font-size:1.5rem;">📷<input type="file" id="imageInput" style="display:none;" accept="image/*"></label>
        <input type="text" id="msgInput" placeholder="メッセージを入力...">
        <button onclick="sendMessage()">送信</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://kcxbtrsplrpxdxhnrglu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjeGJ0cnNwbHJweGR4aG5yZ2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTA4ODQsImV4cCI6MjA4ODM2Njg4NH0.AxYrzEXZihd7FuTnXBu8ddjW4AXch0mMyPpcFRjTTM4';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myProfile = null;
    let activeFriend = null;
    let currentRoomId = null;

    async function init() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return location.href = 'index.html';

      const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
      myProfile = profile;
      document.getElementById('myName').textContent = profile.display_name;
      loadFriends();
    }

    // ユーザーを検索してフレンドに追加
    document.getElementById('searchUser').oninput = async (e) => {
      const q = e.target.value.trim();
      if (!q) return document.getElementById('searchResults').innerHTML = "";
      
      const { data: users } = await supabase.from('profiles').select('*').ilike('username', `%${q}%`).neq('id', myProfile.id);
      const resEl = document.getElementById('searchResults');
      resEl.innerHTML = "";
      users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'friend';
        div.innerHTML = `${u.display_name} <button onclick="addFriend('${u.id}')">+</button>`;
        resEl.appendChild(div);
      });
    };

    async function addFriend(fId) {
      await supabase.from('friends').insert([{ user_id: myProfile.id, friend_id: fId }]);
      await supabase.from('friends').insert([{ user_id: fId, friend_id: myProfile.id }]);
      alert("フレンドに追加しました");
      loadFriends();
    }

    async function loadFriends() {
      const { data: fns } = await supabase.from('friends').select('profiles!friends_friend_id_fkey(*)').eq('user_id', myProfile.id);
      const listEl = document.getElementById('friendList');
      listEl.innerHTML = "";
      fns.forEach(f => {
        const u = f.profiles;
        const div = document.createElement('div');
        div.className = 'friend';
        div.textContent = u.display_name;
        div.onclick = () => openChat(u);
        listEl.appendChild(div);
      });
    }

    async function openChat(friend) {
      activeFriend = friend;
      currentRoomId = [myProfile.id, friend.id].sort().join(':');
      document.getElementById('targetName').textContent = friend.display_name + " さん";
      document.getElementById('messages').innerHTML = "";

      // 過去のメッセージを取得
      const { data: msgs } = await supabase.from('messages').select('*').eq('room_id', currentRoomId).order('created_at', { ascending: true });
      msgs.forEach(m => appendMessage(m));

      // リアルタイム購読
      supabase.channel(`room:${currentRoomId}`)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoomId}` }, 
        payload => appendMessage(payload.new))
        .subscribe();
    }

    async function sendMessage() {
      const text = document.getElementById('msgInput').value.trim();
      const file = document.getElementById('imageInput').files[0];
      if (!text && !file) return;

      let imageUrl = null;
      if (file) {
        const fileName = `${Date.now()}_${file.name}`;
        const { data } = await supabase.storage.from('chat-images').upload(fileName, file);
        if (data) {
          const { data: urlData } = supabase.storage.from('chat-images').getPublicUrl(fileName);
          imageUrl = urlData.publicUrl;
        }
      }

      await supabase.from('messages').insert([{
        room_id: currentRoomId,
        sender_id: myProfile.id,
        text: text,
        image_url: imageUrl
      }]);

      document.getElementById('msgInput').value = "";
      document.getElementById('imageInput').value = "";
    }

    function appendMessage(m) {
      const box = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `bubble ${m.sender_id === myProfile.id ? 'me' : 'other'}`;
      if (m.text) div.textContent = m.text;
      if (m.image_url) {
        const img = document.createElement('img');
        img.src = m.image_url;
        div.appendChild(img);
      }
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    init();
  </script>
</body>
</html>
